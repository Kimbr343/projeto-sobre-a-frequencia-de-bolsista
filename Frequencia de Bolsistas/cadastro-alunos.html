<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cadastro de Alunos</title>

    <link rel="stylesheet" href="cadastro-alunos.css" />
  </head>
  <body>
    <div class="container">
      <h1>Cadastro de Alunos</h1>

      <form id="form-aluno">
        <input type="text" id="nome" placeholder="Nome do aluno" required />

        <input type="text" id="matricula" placeholder="Matrícula" required />

        <input type="text" id="turma" placeholder="Turma" required />

        <button type="submit" id="btn-salvar">Cadastrar</button>
      </form>

      <hr />

      <h2>Alunos Cadastrados</h2>

      <table class="tabela-alunos">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Matrícula</th>
            <th>Turma</th>
            <th>Ações</th>
          </tr>
        </thead>

        <tbody id="lista-alunos"></tbody>
      </table>
    </div>

    <script src="cadastro-alunos.js"></script>
  </body>
</html>
